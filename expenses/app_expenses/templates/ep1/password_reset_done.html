{% extends "ep1/base.html" %} {% block content %}
<div class="auth-wrapper d-flex justify-content-center mt-5 pt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card auth-card p-4 p-md-5">
      <div class="text-center">
        <div class="auth-header-icon">
          <i class="fas fa-envelope-open-text"></i>
        </div>
        <h3 class="auth-title">Email Đã Được Gửi</h3>
        <p class="auth-subtitle text-muted">
          Nếu email tồn tại trong hệ thống, bạn sẽ nhận được một liên kết để đặt lại mật khẩu.
        </p>
      </div>

      <div class="alert alert-success border-0 mb-4">
        <i class="fas fa-check-circle me-2"></i>
        <strong>Kiểm tra hộp thư của bạn!</strong><br>
        <small>Vui lòng kiểm tra cả mục Spam/Junk nếu không thấy email.</small>
      </div>

      <a
        href="{% url "ep1:login" %}"
        class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm"
      >
        <i class="fas fa-arrow-left me-2"></i>Quay Lại Đăng Nhập
      </a>
    </div>
  </div>
</div>
{% endblock content %}
