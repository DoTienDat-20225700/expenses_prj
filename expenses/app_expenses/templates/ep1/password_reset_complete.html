{% extends "ep1/base.html" %} {% block content %}
<div class="auth-wrapper d-flex justify-content-center mt-5 pt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card auth-card p-4 p-md-5">
      <div class="text-center">
        <div class="auth-header-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h3 class="auth-title text-success">Hoàn Tất!</h3>
        <p class="auth-subtitle">
          Mật khẩu của bạn đã được đặt lại thành công.
        </p>
      </div>

      <div class="alert alert-success border-0 mb-4">
        <i class="fas fa-shield-alt me-2"></i>
        <strong>Mật khẩu đã được cập nhật!</strong><br>
        <small>Bây giờ bạn có thể đăng nhập với mật khẩu mới.</small>
      </div>

      <a
        href="{% url "ep1:login" %}"
        class="btn btn-success w-100 py-3 fw-bold rounded-pill shadow-sm"
      >
        <i class="fas fa-sign-in-alt me-2"></i>Đăng Nhập Ngay
      </a>
    </div>
  </div>
</div>
{% endblock content %}
